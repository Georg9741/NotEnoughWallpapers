[Metadata]
Name=NotEnoughWallpapers
Author=Georg9741
Version=2.1.0
License=Creative Commons Attribution - Non - Commercial - Share Alike 3.0
Information=Let's you set predefined Wallpaper Engine Profiles and Rainmeter Layouts

[Rainmeter]
Group=NotEnoughWallpapers
Update=-1
RightMouseUpAction=[!SetVariable ContextType Standard][!SkinCustomMenu]
@IncludeContextMenu="#@#ContextMenu.inc"
@IncludeDefaults="#@#FirstLoad.inc"

;    - - - - - - - - - - - - - - - - - -
;   - - -Apply Profile Count Refresh- - -
;    - - - - - - - - - - - - - - - - - -

[DoubleRefresh]
Meter=Measure
Measure=Calc
IfCondition=#Refresh#=0
IfTrueAction=[!WriteKeyValue Variables Refresh 1][!Refresh]
IfFalseAction=[!WriteKeyValue Variables Refresh 0]

;    - - - - - - - - -
;   - - -Variables- - -
;    - - - - - - - - -

[Variables]
@IncludeVariables="#@#Variables.inc"
@IncludeLimits="#@#VariablesLimits.inc"
@IncludePreviews="#@#PreviewFolders.inc"

Refresh=0
  
;TempFile Name
TempFile=getWallpaper.tmp

; Profiles Alignment
; - - - - - - - - - -(((-(#CURRENTSECTION#)-1)...
Profiles_AlignmentXH=%[#*Profiles_GridColumns_Limits*])*([#*Profiles_IconSize_Limits*]+[#*Profiles_StrokeWidth_Limits*]*2-[#*Profiles_StrokeWidth_Limits*]+[#*Profiles_Gap_Limits*])+[#*OffsetX*]+[#*Background_PaddingLeft*])
Profiles_AlignmentYH=%[#*Profiles_GridColumns_Limits*])=0?([#*Profiles_IconSize_Limits*]+[#*Profiles_StrokeWidth_Limits*]*2+[#*Profiles_Gap_Limits*]-[#*Profiles_StrokeWidth_Limits*]):0)r
Profiles_AlignmentXV=%[#*Profiles_GridRows_Limits*])=0?([#*Profiles_IconSize_Limits*]+[#*Profiles_StrokeWidth_Limits*]*2+[#*Profiles_Gap_Limits*]-[#*Profiles_StrokeWidth_Limits*]):0)r
Profiles_AlignmentYV=%[#*Profiles_GridRows_Limits*])*([#*Profiles_IconSize_Limits*]+[#*Profiles_StrokeWidth_Limits*]*2-[#*Profiles_StrokeWidth_Limits*]+[#*Profiles_Gap_Limits*])+[#*OffsetY*]+[#*Background_PaddingTop_Limits*])

;Background
BackgroundX=(#OffsetX#+#Background_StrokeWidth#)
BackgroundY=(#OffsetY#+#Background_StrokeWidth#)
BackgroundW=((#Profiles_IconSize_Limits#+#Profiles_StrokeWidth#*2)*#Profiles_GridColumns_Limits#+(#Profiles_Gap#-#Profiles_StrokeWidth#)*(#Profiles_GridColumns_Limits#-1)+#Background_PaddingLeft#+#Background_PaddingRight#-#Background_StrokeWidth#*2)
BackgroundH=((#Profiles_IconSize_Limits#+#Profiles_StrokeWidth#*2)*#Profiles_GridRows_Limits#+(#Profiles_Gap#-#Profiles_StrokeWidth#)*(#Profiles_GridRows_Limits#-1)+#Background_PaddingTop#+#Background_PaddingBottom#-#Background_StrokeWidth#*2)
BackgroundX2=#OffsetX#
BackgroundY2=#OffsetY#
BackgroundW2=((#Profiles_IconSize_Limits#+#Profiles_StrokeWidth#*2)*#Profiles_GridColumns_Limits#+(#Profiles_Gap#-#Profiles_StrokeWidth#)*(#Profiles_GridColumns_Limits#-1)+#Background_PaddingLeft#+#Background_PaddingRight#)
BackgroundH2=((#Profiles_IconSize_Limits#+#Profiles_StrokeWidth#*2)*#Profiles_GridRows_Limits#+(#Profiles_Gap#-#Profiles_StrokeWidth#)*(#Profiles_GridRows_Limits#-1)+#Background_PaddingTop#+#Background_PaddingBottom#)
BackgroundCornersFill=((#Background_Corners#<=#Background_StrokeWidth#/2?#Background_StrokeWidth#/2:#Background_Corners#)-#Background_StrokeWidth#/2)
BackgroundCornersStroke=(#Background_Corners#+#Background_StrokeWidth#/2)
;ProfilesStyle
ProfilesCornersFill=((#Profiles_Corners#<=#Profiles_StrokeWidth#/2?#Profiles_StrokeWidth#/2:#Profiles_Corners#)-#Profiles_StrokeWidth#/2)
ProfilesCornersStroke=(#Profiles_Corners#+#Profiles_StrokeWidth#/2)

;    - - - - - - - - - - - - -
;   - - -Preview Measures - - -
;    - - - - - - - - - - - - -

[PreviewPathMeasure]
Measure=Plugin
Plugin=RunCommand
Parameter="#WEPath#" -control getWallpaper > #TempFile# & more #TempFile# & del #TempFile#
OutputType=ANSI
Substitute="\/":"\","\n":"","(?!.+\\).+$":""
RegExpSubstitute=1
FinishAction=[!WriteKeyValue Variables Folder[#Path] "[#CURRENTSECTION#]" "#@#PreviewFolders.inc"][!Refresh]

[PreviewMeasuresScript]
Measure=Script
ScriptFile="#@#Scripts\PreviewMeasures.lua"
Number=#Profiles_Count_Limits#
IncFile="#@#PreviewMeasures.inc"

[PreviewMeasures]
@IncludePreviews="#@#PreviewMeasures.inc"

;    - - - - - - -
;   - - -Body - - -
;    - - - - - - -

[Background]
Meter=Shape
Shape=Rectangle #BackgroundX#,#BackgroundY#,#BackgroundW#,#BackgroundH#,#BackgroundCornersFill# | Fill Color #Background_FillColor#,#Background_FillOpacity# | StrokeWidth 0
Shape2=Rectangle #BackgroundX2#,#BackgroundY2#,#BackgroundW2#,#BackgroundH2#,#BackgroundCornersStroke# | Fill Color #Background_StrokeColor#,#Background_StrokeOpacity# | StrokeWidth 0
Shape3=Rectangle #BackgroundX#,#BackgroundY#,#BackgroundW#,#BackgroundH#,#BackgroundCornersFill#
Shape4=Combine Shape2 | Exclude Shape3

;    - - - - - - - -
;   - - -Styles - - -
;    - - - - - - - -

[ProfilesStyle]
X=(((-(#CURRENTSECTION#)-1)[#Profiles_AlignmentX[#Profiles_Alignment]]
Y=(((-(#CURRENTSECTION#)-1)[#Profiles_AlignmentY[#Profiles_Alignment]]
Shape=Rectangle #Profiles_StrokeWidth#,#Profiles_StrokeWidth#,#Profiles_IconSize_Limits#,#Profiles_IconSize_Limits#,#ProfilesCornersFill# | Fill Color #Background_FillColor#,128 | StrokeWidth 0
Shape2=Rectangle 0,0,(#Profiles_IconSize_Limits#+#Profiles_StrokeWidth#*2),(#Profiles_IconSize_Limits#+#Profiles_StrokeWidth#*2),#ProfilesCornersStroke# | Fill Color #Profiles_StrokeColor#,#Profiles_StrokeOpacity# | StrokeWidth 0
Shape3=Rectangle #Profiles_StrokeWidth#,#Profiles_StrokeWidth#,#Profiles_IconSize_Limits#,#Profiles_IconSize_Limits#,#ProfilesCornersFill#
Shape4=Combine Shape2 | Exclude Shape3

[ContainerStyle]
X=r
Y=r
Shape=Rectangle #Profiles_StrokeWidth#,#Profiles_StrokeWidth#,#Profiles_IconSize_Limits#,#Profiles_IconSize_Limits#,#ProfilesCornersFill#
[ImageStyle]
X=#Profiles_StrokeWidth#r
Y=#Profiles_StrokeWidth#r
W=#Profiles_IconSize_Limits#
H=#Profiles_IconSize_Limits#
ImageName="#@#\Images\NoImage.png"
LeftMouseUpAction=["#WEPath#" -control openProfile -profile "[#Profile[#CURRENTSECTION]]"][!LoadLayout "[#Layout[#CURRENTSECTION]]"]
RightMouseUpAction=[!SetVariable ContextType [#CURRENTSECTION]][!SkinCustomMenu]
Container=Container[#CURRENTSECTION]

[OnHoverStyle]
X=r
Y=r
Shape=Rectangle #Profiles_StrokeWidth#,#Profiles_StrokeWidth#,#Profiles_IconSize_Limits#,#Profiles_IconSize_Limits#,#ProfilesCornersFill# | Extend OnHover
OnHover=Fill Color 0,0,0,0 | StrokeWidth 0
MouseOverAction=[!SetOption #CURRENTSECTION# OnHover "Fill Color #Profiles_OnHoverColor#,#Profiles_OnHoverOpacity# | StrokeWidth 0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# OnHover "Fill Color 0,0,0,0 | StrokeWidth 0"][!UpdateMeter #CURRENTSECTION#][!Redraw]

;    - - - - - - - - -
;   - - -Profiles - - -
;    - - - - - - - - -

[ProfilesScript]
Measure=Script
ScriptFile="#@#Scripts\Profiles.lua"
Number=#Profiles_Count_Limits#
IncFile="#@#Profiles.inc"
[ProfileVariablesScript]
Measure=Script
ScriptFile="#@#Scripts\ProfileVariables.lua"
Number=#Profiles_Count_Limits#
IncFile="#@#ProfileVariables.inc"

; - Profiles Offset
[-1]
X=(#OffsetX#+#Background_PaddingLeft#)
Y=(#OffsetY#+#Background_PaddingTop#)

[Profiles]
@IncludeProfiles="#@#Profiles.inc"
@IncludePreviews="#@#PreviewIncMeasures.inc"
