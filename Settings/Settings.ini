[GroundBarTextStyle]
Y=(#BodyHeight#-21)
FontFace=Segoe UI
FontSize=8.6
FontColor=204,204,204
FontWeight=640
AntiAlias=1
[GroundBarText1]
Meter=String
Text=by Georg9741
X=21
MeterStyle=GroundBarTextStyle
[GroundBarText2]
Meter=String
Text=[IconSizePercentageCalc]%
X=(#BodyWidth#-367)
MeterStyle=GroundBarTextStyle
DynamicVariables=1
[GroundBarText3]
Meter=String
Text=Windows (CRLF)
X=(64-7)R
MeterStyle=GroundBarTextStyle
[GroundBarText4]
Meter=String
Text=UTF-8
X=(64+6)R
MeterStyle=GroundBarTextStyle
[IconSizePercentageCalc]
Meter=Measure
Measure=Calc
Formula=(round((100/128*#Profiles_IconSize_Limits#), -1))
[TextDivider]
Meter=Shape
Shape=Line ([GroundBarText2:X]-9.5),(#BodyHeight#-14-8),([GroundBarText2:X]-9.5),(#BodyHeight#-14+8) | StrokeWidth 1 | Stroke Color 49,49,49
Shape2=Line ([GroundBarText3:X]-9.5),(#BodyHeight#-14-8),([GroundBarText3:X]-9.5),(#BodyHeight#-14+8) | StrokeWidth 1 | Stroke Color 49,49,49
Shape3=Line ([GroundBarText4:X]-9.5),(#BodyHeight#-14-8),([GroundBarText4:X]-9.5),(#BodyHeight#-14+8) | StrokeWidth 1 | Stroke Color 49,49,49
DynamicVariables=1

