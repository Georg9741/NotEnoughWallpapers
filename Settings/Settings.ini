[Rainmeter]
Group=NotEnoughWallpapers
Update=3000
DefaultUpdateDivider=-1
OnUpdateAction=[!UpdateMeter Shape][!UpdateMeter ShapeStroke][!Redraw]
OnRefreshAction=[!ShowMeterGroup #Section#][!Redraw]
OnFocusAction=[!SetOption Shape FillColor "Fill Color [*Accent*]"][!UpdateMeter Shape][!SetOption ShapeStroke FillColor "Fill Color [*Accent*]"][!UpdateMeter ShapeStroke][!SetVariable Contrast Focus][!HideMeter CloseUnfocus][!ShowMeter CloseFocus][!ShowMeter MinimizeFocus][!HideMeter MinimizeUnfocus][!Redraw]
OnUnfocusAction=[!SetOption Shape FillColor "Fill Color 0,0,0,0"][!UpdateMeter Shape][!SetOption ShapeStroke FillColor "Fill Color 255,255,255,32"][!UpdateMeter ShapeStroke][!SetVariable Contrast Unfocus][!HideMeter CloseFocus][!ShowMeter CloseUnfocus][!HideMeter MinimizeFocus][!ShowMeter MinimizeUnfocus][!Redraw]

;    - - - - - - - - -
;   - - -Variables- - -
;    - - - - - - - - -

[Variables]
@IncludeVariables="#@#Variables.inc"
@IncludeLimits="#@#VariablesLimits.inc"

Section=Main

BodyWidth=512
BodyHeight=384

Contrast=Unfocus
ContrastFocus=#Lumens#
ContrastUnfocus=255,255,255
 
; Selected Alignment
HorizontalH=64,64,64,96
HorizontalV=0,0,0,0
VerticalH=0,0,0,0
VerticalV=64,64,64,96

; Options Positions

;Main
Profiles_Count_TextX=5
Profiles_Count_TextY=105
Profiles_Count_InputX=220
Profiles_Count_InputY=105

Profiles_GridColumns_TextX=5
Profiles_GridColumns_TextY=135
Profiles_GridColumns_InputX=250
Profiles_GridColumns_InputY=135
Profiles_GridRows_TextX=5
Profiles_GridRows_TextY=165
Profiles_GridRows_InputX=220
Profiles_GridRows_InputY=165

Profiles_Alignment_TextX=5
Profiles_Alignment_TextY=195
Profiles_Alignment_SwitchX=250
Profiles_Alignment_SwitchY=195

;Shape
Profiles_IconSize_TextX=5
Profiles_IconSize_TextY=105
Profiles_IconSize_InputX=250
Profiles_IconSize_InputY=105

Profiles_StrokeWidth_TextX=5
Profiles_StrokeWidth_TextY=135
Profiles_StrokeWidth_InputX=220
Profiles_StrokeWidth_InputY=135

Background_StrokeWidth_TextX=5
Background_StrokeWidth_TextY=165
Background_StrokeWidth_InputX=250
Background_StrokeWidth_InputY=165

Profiles_Gap_TextX=5
Profiles_Gap_TextY=195
Profiles_Gap_InputX=220
Profiles_Gap_InputY=195

Background_Padding_TextX=5
Background_Padding_TextY=225
Background_PaddingTop_InputX=250
Background_PaddingTop_InputY=225
Background_PaddingBottom_InputX=300
Background_PaddingBottom_InputY=225
Background_PaddingRight_InputX=350
Background_PaddingRight_InputY=225
Background_PaddingLeft_InputX=400
Background_PaddingLeft_InputY=225

Profiles_Corners_TextX=5
Profiles_Corners_TextY=255
Profiles_Corners_InputX=220
Profiles_Corners_InputY=255

Background_Corners_TextX=5
Background_Corners_TextY=285
Background_Corners_InputX=250
Background_Corners_InputY=285

;Colors
Background_FillColor_TextX=
Background_FillColor_TextY=
Background_FillColor_InputX=
Background_FillColor_InputY=

Profiles_StrokeColor_TextX=
Profiles_StrokeColor_TextY=
Profiles_StrokeColor_InputX=
Profiles_StrokeColor_InputY=

Background_StrokeColor_TextX=
Background_StrokeColor_TextY=
Background_StrokeColor_InputX=
Background_StrokeColor_InputY=

Profiles_OnHoverEffect_TextX=
Profiles_OnHoverEffect_TextY=
Profiles_OnHoverEffect_InputX=
Profiles_OnHoverEffect_InputY=

;   - - -Automatic Adjustments- - -

Switch=0
Switch2=0

Profiles_Grid1H=Profiles_GridRows
Profiles_Grid1V=Profiles_GridColumns
Profiles_Grid2H=Profiles_GridColumns
Profiles_Grid2V=Profiles_GridRows

;    - - - - - - - - - - - - - - -
;   - - -Automatic Adjustments- - -
;    - - - - - - - - - - - - - - -

[OnGridInputAction]
Meter=Measure
Measure=Calc
IfCondition=#Switch#=1
IfTrueAction=[!WriteKeyValue Variables Profiles_Count "(#Profiles_GridColumns_Limits#*#Profiles_GridRows_Limits#)" "#@#Variables.inc"][!WriteKeyValue Variables Switch 0][!RefreshGroup NotEnoughWallpapers]

[OnProfileCountInputAction]
Meter=Measure
Measure=Calc
IfCondition=(#Switch2#>0)&&(#Profiles_Count_Limits#>#Profiles_GridColumns_Limits#*#Profiles_GridRows_Limits#)
IfTrueAction=[!WriteKeyValue Variables [#Profiles_Grid1[#Profiles_Alignment]] "(Ceil([#[#Profiles_Grid1[#Profiles_Alignment]]]+(#Profiles_Count_Limits#-#Profiles_GridColumns_Limits#*#Profiles_GridRows_Limits#)/[#[#Profiles_Grid2[#Profiles_Alignment]]]))" "#@#Variables.inc"]
IfCondition2=(#Switch2#>0)&&(#Profiles_Count_Limits#<#Profiles_GridColumns_Limits#*#Profiles_GridRows_Limits#)
IfTrueAction2=[!WriteKeyValue Variables [#Profiles_Grid1[#Profiles_Alignment]] "(Ceil([#[#Profiles_Grid1[#Profiles_Alignment]]]+(#Profiles_Count_Limits#-#Profiles_GridColumns_Limits#*#Profiles_GridRows_Limits#)/[#[#Profiles_Grid2[#Profiles_Alignment]]]))" "#@#Variables.inc"]
IfCondition3=(#Switch2#>0)&&(#Profiles_Count_Limits#<[#[#Profiles_Grid2[#Profiles_Alignment]]])
IfTrueAction3=[!WriteKeyValue Variables [#Profiles_Grid2[#Profiles_Alignment]] "(#Profiles_Count_Limits#)" "#@#Variables.inc"]
IfCondition4=#Switch2#>0
IfTrueAction4=[!WriteKeyValue Variables Switch2 0][!RefreshGroup NotEnoughWallpapers]

;    - - - - - - - - -
;   - - -Measures - - -
;    - - - - - - - - -

; Windows Accent Color
[Accent]
Measure=Plugin
Plugin=SysColor
UpdateDivider=1

; Contrast
[LumensScript]
Measure=Script
ScriptFile="#ROOTCONFIGPATH#ColorPickerPlus\Extra\Scripts\HSBLib.lua"
[LumensMeasure]
Measure=Calc
UpdateDivider=1
IfCondition=[&LumensScript:ColorLumens("[&Accent]")] > 50
IfTrueAction=[!SetVariable Lumens 0,0,0][!UpdateMeter CloseFocus][!UpdateMeter MinimizeFocus][!Redraw]
IfFalseAction=[!SetVariable Lumens 255,255,255][!UpdateMeter CloseFocus][!UpdateMeter MinimizeFocus][!Redraw]
DynamicVariables=1

;    - - - - - - - -
;   - - -Styles - - -
;    - - - - - - - -

[TextStyle]
FontFace=Segoe UI
FontColor=255,255,255
AntiAlias=1

;    - - - - - - -
;   - - -Body- - -
;    - - - - - - -

[Shape]
Meter=Shape
;Background
Shape=Rectangle 1,1,#BodyWidth#,#BodyHeight# | StrokeWidth 0 | Fill Color 39,39,39
;TopOptionsArea
Shape2=Rectangle 1,1,#BodyWidth#,70 | StrokeWidth 0 | Fill Color 32,32,32
Shape3=Line 1,71.5,(#BodyWidth#+1),71.5 | StrokeWidth 1 | Stroke Color 29,29,29
;TopBar
Shape4=Rectangle 1,1,#BodyWidth#,30 | StrokeWidth 0 | Extend FillColor
;GroundBar
Shape5=Rectangle 1,(#BodyHeight#-30),#BodyWidth#,31 | StrokeWidth 0 | Fill Color 32,32,32
Shape6=Line 1,(#BodyHeight#-30.5),(#BodyWidth#+1),(#BodyHeight#-30.5) | StrokeWidth 1 | Stroke Color 29,29,29
FillColor=FillColor 0,0,0,0
DynamicVariables=1
Container=Container
[Container]
Meter=Shape
Shape=Rectangle 1,1,#BodyWidth#,#BodyHeight#,8

[ShapeStroke]
Meter=Shape
Shape=Rectangle 0,0,(#BodyWidth#+2),(#BodyHeight#+2),8 | StrokeWidth 0 | Extend FillColor
Shape2=Rectangle 1,1,#BodyWidth#,#BodyHeight#,8
Shape3=Combine Shape | Exclude Shape2
FillColor=Fill Color 255,255,255,32
DynamicVariables=1

;    - - - - - - - -
;   - - -TopBar - - -
;    - - - - - - - -

[TopBarTitle]
Meter=String
Text=#ROOTCONFIG# - #Section#
X=47
Y=7
FontSize=8.7
MeterStyle=TextStyle
DynamicVariables=1

[TopBarIcon]
Meter=Image
ImageName="#@#Images\Settings_Icon.png"
X=17
Y=8
W=16
H=16

;   - - -Close - - -
[CloseUnfocus]
Meter=Shape
Shape=Line (#BodyWidth#-27),10,(#BodyWidth#-17),20 | StrokeWidth 1 | Stroke Color 255,255,255,128
Shape2=Line (#BodyWidth#-27),20,(#BodyWidth#-17),10 | StrokeWidth 1 | Stroke Color 255,255,255,128
[CloseFocus]
Meter=Shape
Shape=Line (#BodyWidth#-27),10,(#BodyWidth#-17),20 | StrokeWidth 1 | Stroke Color #Lumens#
Shape2=Line (#BodyWidth#-27),20,(#BodyWidth#-17),10 | StrokeWidth 1 | Stroke Color #Lumens#
DynamicVariables=1
Hidden=1
[CloseHover]
Meter=Shape
Shape=Rectangle (#BodyWidth#-44),1,45,29 | StrokeWidth 0 | Extend FillColor
Shape2=Line (#BodyWidth#-27),10,(#BodyWidth#-17),20 | StrokeWidth 1 | Extend Cross
Shape3=Line (#BodyWidth#-27),20,(#BodyWidth#-17),10 | StrokeWidth 1 | Extend Cross
FillColor=Fill Color 0,0,0,0
Cross=Stroke Color 0,0,0,0
MouseOverAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 196,43,28"][!SetOption #CURRENTSECTION# Cross "Stroke Color 255,255,255"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 0,0,0,0"][!SetOption #CURRENTSECTION# Cross "Stroke Color 0,0,0,0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
LeftMouseUpAction=[!DeactivateConfig][!WriteKeyValue Variables Section Main]
Container=Container

;   - - -Minimize- - -
[MinimizeUnfocus]
Meter=Shape
Shape=Line (#BodyWidth#-71),15.5,(#BodyWidth#-61),15.5 | StrokeWidth 1 | Stroke Color 255,255,255,128
[MinimizeFocus]
Meter=Shape
Shape=Line (#BodyWidth#-71),15.5,(#BodyWidth#-61),15.5 | StrokeWidth 1 | Stroke Color #Lumens#
DynamicVariables=1
Hidden=1
[MinimizeHover]
Meter=Shape
Shape=Rectangle (#BodyWidth#-90),1,45,29 | StrokeWidth 0 | Extend Hover
Shape2=Line (#BodyWidth#-71),15.5,(#BodyWidth#-61),15.5 | StrokeWidth 1 | Extend Line
Hover=Fill Color 0,0,0,0
Line=Stroke Color 0,0,0,0
MouseOverAction=[!SetOption #CURRENTSECTION# Hover "Fill Color [#Contrast[#Contrast]],16"][!SetOption #CURRENTSECTION# Line "Stroke Color [#Contrast[#Contrast]]"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# Hover "Fill Color 0,0,0,0"][!SetOption #CURRENTSECTION# Line "Stroke Color 0,0,0,0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Minimized" "Minimized.ini"][!ShowFade "#ROOTCONFIG#\Minimized"][!DeactivateConfig "#CURRENTCONFIG#"][!HideFade "#CURRENTCONFIG#"]

;    - - - - - - - - - -
;   - - -OptionsBar - - -
;    - - - - - - - - - -

;   - - -Main- - -
[SectionMainText]
Meter=String
Text=Main
X=12
Y=43
FontSize=10
MeterStyle=TextStyle
[SectionMainHover]
Meter=Shape
Shape=Rectangle 5,36,([SectionMainText:W]+16),32,4 | StrokeWidth 0 | Extend FillColor
FillColor=Fill Color 0,0,0,0
MouseOverAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 255,255,255,16"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 0,0,0,0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
LeftMouseUpAction=[!ShowMeterGroup Main][!HideMeterGroup Shape][!HideMeterGroup Colors][!WriteKeyValue Variables Section Main][!SetVariable Section Main][!UpdateMeter TopBarTitle][!Redraw]
DynamicVariables=1

;   - - -Shape - - -
[SectionShapeText]
Meter=String
Text=Shape
X=(12+[SectionMainText:W]+24)
Y=43
FontSize=10
MeterStyle=TextStyle
DynamicVariables=1
[SectionShapeHover]
Meter=Shape
Shape=Rectangle (5+[SectionMainText:W]+24),36,([SectionShapeText:W]+16),32,4 | StrokeWidth 0 | Extend FillColor
FillColor=Fill Color 0,0,0,0
MouseOverAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 255,255,255,16"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 0,0,0,0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
LeftMouseUpAction=[!HideMeterGroup Main][!ShowMeterGroup Shape][!HideMeterGroup Colors][!WriteKeyValue Variables Section Shape][!SetVariable Section Shape][!UpdateMeter TopBarTitle][!Redraw]
DynamicVariables=1

;   - - -Colors- - -
[SectionColorsText]
Meter=String
Text=Colors
X=(12+[SectionMainText:W]+24+[SectionShapeText:W]+24)
Y=43
FontSize=10
MeterStyle=TextStyle
DynamicVariables=1
[SectionColorsHover]
Meter=Shape
Shape=Rectangle (5+[SectionMainText:W]+24+[SectionShapeText:W]+24),36,([SectionColorsText:W]+16),32,4 | StrokeWidth 0 | Extend FillColor
FillColor=Fill Color 0,0,0,0
MouseOverAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 255,255,255,16"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 0,0,0,0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
LeftMouseUpAction=[!HideMeterGroup Main][!HideMeterGroup Shape][!ShowMeterGroup Colors][!WriteKeyValue Variables Section Colors][!SetVariable Section Colors][!UpdateMeter TopBarTitle][!Redraw]
DynamicVariables=1

; Open Variables.inc
[OpenVariablesIcon]
Meter=Image
ImageName="#@#Images\Variables_Icon.png"
X=(#BodyWidth#-30)
Y=44
W=16
H=16
[OpenVariablesIconHover]
Meter=Shape
Shape=Rectangle (#BodyWidth#-37),37,30,30,4 | StrokeWidth 0 | Extend FillColor
FillColor=Fill Color 0,0,0,0
MouseOverAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 255,255,255,16"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FillColor "Fill Color 0,0,0,0"][!UpdateMeter #CURRENTSECTION#][!Redraw]
LeftMouseUpAction=["#@#Variables.inc"]

